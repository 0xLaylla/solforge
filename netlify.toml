[build]
  publish = "frontend"
  command = "echo 'Static frontend; no build step'"

[build.environment]
  NODE_VERSION = "20"

# Inject backend URL at deploy time via Netlify env var SOLFORGE_API
# Default points to /.netlify/functions/proxy if backend hosted separately
[[redirects]]
  from = "/api/*"
  to = "https://solforge-api.onrender.com/api/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
